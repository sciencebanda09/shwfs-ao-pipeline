name: CI Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: |
          flake8 . \
            --exclude=.git,__pycache__,*.egg-info,notebooks \
            --max-line-length=100 \
            --ignore=E203,W503

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install mypy numpy
          pip install -r requirements.txt || true
      - name: Run mypy
        run: |
          mypy . \
            --ignore-missing-imports \
            --exclude notebooks \
            --exclude c_ext

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install -r requirements.txt || true
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-exclude=notebooks \
            --cov-report=term-missing \
            --cov-fail-under=70
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
